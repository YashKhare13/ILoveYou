<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💖 PraYash 💖</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="hearts-bg"></div>

    <div class="container">

        <div class="name-marquee">
    <marquee behavior="alternate" scrollamount="8"
        onmouseover="this.stop();"
        onmouseout="this.start();">

        💫 Not Just Names…
        <span class="prayash-name">PraYash</span>
        is Destiny 💖

    </marquee>
</div>

        <h1>Sharma Ji… Ek Important Question hai ❤️</h1>

        <div class="gif-container">
            <img id="cat-gif"
                src="https://media.tenor.com/EBV7OT7ACfwAAAAj/u-u-qua-qua-u-quaa.gif"
                alt="cute character">
        </div>

        <div class="buttons">
            <button id="yes-btn" onclick="handleYesClick()">Yes</button>
            <button id="no-btn" onclick="handleNoClick()">No</button>
        </div>

        <div id="tease-toast"></div>

    </div>

    <audio id="bg-music" loop autoplay muted>
        <source src="music/Song.mp3" type="audio/mpeg">
    </audio>

    <button id="music-toggle" onclick="toggleMusic()" title="Toggle music">
        🔊
    </button>

    <script src="script.js"></script>

</body>
</html>
